<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dispatch Console</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0D0A0C;
    --panel: #181315;
    --panel-2: #201A1D;
    --line: #322A2D;
    --line-bright: #4A3D40;
    --marigold: #F2A93B;
    --marigold-dim: #7A5A22;
    --sindoor: #E8402C;
    --sindoor-soft: rgba(232,64,44,0.14);
    --success: #3DDC84;
    --success-soft: rgba(61,220,132,0.12);
    --text: #F5F1EC;
    --text-muted: #9C8E88;
    --ease: cubic-bezier(0.32, 0.72, 0, 1);
  }
  * { box-sizing: border-box; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--void);
    background-image: radial-gradient(circle at 50% -10%, #2A1A1D 0%, var(--void) 55%);
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    min-height: 100vh;
  }
  .display { font-family: 'Sora', sans-serif; }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }

  header {
    padding: 22px 20px 18px;
    position: sticky; top: 0; z-index: 30;
    background: linear-gradient(to bottom, var(--void) 70%, transparent);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(155deg, var(--marigold), var(--sindoor));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Sora'; font-weight: 800; font-size: 15px; color: var(--void);
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'Sora'; font-size: 15.5px; margin: 0; font-weight: 700;
    letter-spacing: -0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px;
  }
  header .sub { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; letter-spacing: 0.03em; text-transform: uppercase; }

  .container { max-width: 560px; margin: 0 auto; padding: 0 16px 60px; }

  .panel {
    background: var(--panel);
    border-radius: 16px;
    padding: 18px 18px;
    margin-bottom: 14px;
    border: 1px solid var(--line);
  }

  .progress-top { display: flex; justify-content: space-between; align-items: baseline; }
  .progress-count { font-family: 'Sora'; font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
  .progress-count .of { color: var(--text-muted); font-weight: 600; font-size: 16px; }
  .progress-label { font-size: 11.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .progress-track {
    background: var(--panel-2); border-radius: 100px; height: 7px; overflow: hidden; margin-top: 12px;
    border: 1px solid var(--line);
  }
  .progress-fill {
    background: linear-gradient(90deg, var(--sindoor), var(--marigold));
    height: 100%; border-radius: 100px;
    transition: width 0.6s var(--ease);
  }
  .refresh-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 12px; padding: 0; margin-top: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    font-weight: 600;
    transition: color 0.2s;
  }
  .refresh-btn:active { color: var(--marigold); }

  .step {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.4s var(--ease);
  }
  .step.active { border-color: var(--line-bright); box-shadow: 0 0 0 1px var(--marigold-dim); }
  .step-header { display: flex; align-items: center; gap: 12px; padding: 16px 18px; }
  .step-num {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--panel-2); border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Sora'; font-size: 12.5px; font-weight: 700; color: var(--text-muted);
    flex-shrink: 0;
    transition: all 0.35s var(--ease);
  }
  .step.active .step-num { background: var(--marigold); border-color: var(--marigold); color: var(--void); }
  .step.done .step-num { background: var(--success); border-color: var(--success); color: var(--void); }
  .step-title { font-family: 'Sora'; font-size: 14.5px; font-weight: 700; }
  .step-summary { font-size: 12px; color: var(--text-muted); margin-left: auto; text-align: right; max-width: 55%;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .step-body {
    max-height: 0; opacity: 0; overflow: hidden;
    transition: max-height 0.45s var(--ease), opacity 0.35s var(--ease);
    padding: 0 18px;
  }
  .step.active .step-body { max-height: 700px; opacity: 1; padding: 0 18px 18px; }

  button {
    font-family: 'Inter', sans-serif; font-size: 15px; border: none; border-radius: 12px;
    padding: 13px 16px; cursor: pointer; font-weight: 700;
    transition: transform 0.15s var(--ease), opacity 0.15s var(--ease), background 0.2s var(--ease);
  }
  button:active { transform: scale(0.97); }
  .btn-primary { background: var(--marigold); color: var(--void); width: 100%; }
  .btn-primary:disabled { background: var(--panel-2); color: var(--text-muted); cursor: not-allowed; }
  .btn-primary:disabled:active { transform: none; }
  .btn-secondary { background: var(--panel-2); color: var(--text); width: 100%; border: 1px solid var(--line); }
  .btn-danger { background: var(--sindoor); color: white; width: 100%; }
  .btn-ghost { background: none; color: var(--marigold); text-decoration: none; padding: 8px 0; font-size: 13.5px; }

  input[type=text] {
    width: 100%; padding: 13px 14px; font-size: 15.5px;
    border: 1px solid var(--line); border-radius: 12px;
    font-family: 'Inter'; background: var(--panel-2); color: var(--text);
    transition: border-color 0.2s var(--ease);
  }
  input[type=text]::placeholder { color: var(--text-muted); }
  input[type=text]:focus { outline: none; border-color: var(--marigold); }

  #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 10px; }

  .barcode-pill {
    font-family: 'IBM Plex Mono'; font-size: 17px; font-weight: 600;
    background: var(--panel-2); border: 1px solid var(--marigold-dim); color: var(--marigold);
    padding: 12px 14px; border-radius: 12px; text-align: center; letter-spacing: 0.5px;
    margin-bottom: 10px; animation: pop-in 0.4s var(--ease);
  }
  @keyframes pop-in { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .result-item {
    padding: 12px 14px; border: 1px solid var(--line); border-radius: 12px;
    margin-bottom: 8px; cursor: pointer;
    transition: border-color 0.2s var(--ease), background 0.2s var(--ease);
  }
  .result-item:active { background: var(--panel-2); }
  .result-item.selected { border-color: var(--marigold); background: rgba(242,169,59,0.06); }
  .result-item .name { font-weight: 700; font-size: 14.5px; }
  .result-item .meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .badge-done {
    display: inline-block; font-size: 10.5px; font-weight: 700;
    background: var(--success-soft); color: var(--success);
    padding: 2px 7px; border-radius: 6px; margin-left: 6px;
  }

  .status-box {
    padding: 13px 14px; border-radius: 12px; margin-top: 10px;
    font-size: 14px; line-height: 1.5; animation: slide-up 0.35s var(--ease);
  }
  @keyframes slide-up { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .status-conflict, .status-error { background: var(--sindoor-soft); color: #FF9184; }

  .stamp-overlay {
    position: fixed; inset: 0; background: rgba(13,10,12,0.65);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity 0.25s var(--ease);
    backdrop-filter: blur(4px);
  }
  .stamp-overlay.show { opacity: 1; pointer-events: auto; }
  .stamp {
    width: 156px; height: 156px; border-radius: 50%;
    border: 4px solid var(--marigold);
    box-shadow: 0 0 40px rgba(242,169,59,0.35);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--panel);
    transform: rotate(-18deg) scale(0.4); opacity: 0;
    transition: transform 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49), opacity 0.3s var(--ease);
  }
  .stamp-overlay.show .stamp { transform: rotate(-10deg) scale(1); opacity: 1; }
  .stamp .tick { font-size: 46px; color: var(--marigold); line-height: 1; }
  .stamp .txt { font-family: 'Sora'; font-size: 11px; font-weight: 700; color: var(--marigold); letter-spacing: 0.08em; margin-top: 4px; }
  .stamp .name { font-size: 10.5px; color: var(--text); margin-top: 3px; padding: 0 12px; text-align: center; }

  .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .log-count { font-family: 'Sora'; font-size: 13px; font-weight: 700; color: var(--marigold); background: rgba(242,169,59,0.1); padding: 3px 10px; border-radius: 100px; }
  .log-empty { font-size: 13px; color: var(--text-muted); text-align: center; padding: 14px 0; }
  .log-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; padding: 10px 0; border-bottom: 1px solid var(--line);
    animation: slide-up 0.3s var(--ease);
  }
  .log-row:last-child { border-bottom: none; }
  .log-row .barcode { font-family: 'IBM Plex Mono'; font-size: 11.5px; color: var(--text-muted); }
  .log-row .serial { color: var(--text-muted); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">R</div>
    <div>
      <h1 id="orgName">Dispatch Console</h1>
      <div class="sub">Registered Post Tracking</div>
    </div>
  </div>
</header>

<div class="container">

  <div class="panel">
    <div class="progress-top">
      <span class="progress-count"><span id="progressDone">–</span><span class="of" id="progressOf"></span></span>
      <span class="progress-label" id="progressLabel">Loading</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <button class="refresh-btn" onclick="refreshData()">↻ Refresh list</button>
  </div>

  <!-- STEP 1: SCAN -->
  <div class="step active" id="step1">
    <div class="step-header">
      <div class="step-num">1</div>
      <div class="step-title">Scan Barcode</div>
      <div class="step-summary" id="step1Summary"></div>
    </div>
    <div class="step-body">
      <div id="reader"></div>
      <button class="btn-secondary" id="scanToggleBtn" onclick="toggleScanner()">📷 Start Camera</button>
      <div class="barcode-pill" id="barcodeDisplay" style="display:none"></div>
      <div style="margin-top:10px">
        <input type="text" id="manualBarcodeInput" placeholder="Or type barcode manually">
        <button class="btn-ghost" onclick="useManualBarcode()">Use this barcode →</button>
      </div>
    </div>
  </div>

  <!-- STEP 2: MATCH -->
  <div class="step" id="step2">
    <div class="step-header">
      <div class="step-num">2</div>
      <div class="step-title">Match Customer</div>
      <div class="step-summary" id="step2Summary"></div>
    </div>
    <div class="step-body">
      <input type="text" id="nameSearchInput" placeholder="Type receiver name…" oninput="onSearchInput()">
      <div id="searchResults" style="margin-top:10px"></div>
    </div>
  </div>

  <!-- STEP 3: CONFIRM -->
  <div class="step" id="step3">
    <div class="step-header">
      <div class="step-num">3</div>
      <div class="step-title">Confirm & Save</div>
      <div class="step-summary" id="step3Summary"></div>
    </div>
    <div class="step-body">
      <div id="selectedCustomerBox"></div>
      <button class="btn-primary" id="saveBtn" style="margin-top:12px" onclick="saveEntry(false)" disabled>Save Entry</button>
      <div id="statusBox"></div>
    </div>
  </div>

  <div class="panel">
    <div class="log-header">
      <div class="step-title">Session Log</div>
      <div class="log-count" id="logCount">0 saved</div>
    </div>
    <input type="text" id="logSearchInput" placeholder="Search this session…" oninput="renderLog()">
    <div id="logList" style="margin-top:10px"><div class="log-empty">No entries saved yet</div></div>
  </div>

</div>

<div class="stamp-overlay" id="stampOverlay">
  <div class="stamp">
    <div class="tick">✓</div>
    <div class="txt">REGISTERED</div>
    <div class="name" id="stampName"></div>
  </div>
</div>

<script>
// ====== HARDCODED BACKEND URL (no setup needed on employee phones) ======
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby1E-fAm8warS4vNVl2bl5RQOmsPRQs0HvbVzvPTEMbmutYdK1FIl4hoOchgPGaIhWdXw/exec';

let allRows = [];
let selectedCustomer = null;
let scannedBarcode = '';
let html5QrCode = null;
let scannerRunning = false;
let sessionLog = [];

window.onload = function () { refreshData(); };

// ---------- LOAD DATA ----------
function refreshData() {
  document.getElementById('progressLabel').innerText = 'Loading';
  fetch(APPS_SCRIPT_URL + '?action=list')
    .then(r => r.json())
    .then(data => {
      if (data.status !== 'success') { document.getElementById('progressLabel').innerText = 'Error: ' + data.message; return; }
      allRows = data.rows;
      updateProgress();
      if (allRows.length && allRows[0]['NAME OF SENDER']) {
        document.getElementById('orgName').innerText = allRows[0]['NAME OF SENDER'];
      }
    })
    .catch(() => { document.getElementById('progressLabel').innerText = 'Connection failed'; });
}

function updateProgress() {
  const total = allRows.length;
  const done = allRows.filter(r => r['ARTICLE BARCODE'] && String(r['ARTICLE BARCODE']).trim() !== '').length;
  document.getElementById('progressDone').innerText = done;
  document.getElementById('progressOf').innerText = ' / ' + total;
  document.getElementById('progressLabel').innerText = 'Linked';
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ---------- STEP STATE ----------
function setStep(n) {
  [1,2,3].forEach(i => {
    const el = document.getElementById('step' + i);
    el.classList.remove('active', 'done');
    if (i < n) el.classList.add('done');
    if (i === n) el.classList.add('active');
  });
}

// ---------- SCANNER ----------
function toggleScanner() {
  if (scannerRunning) {
    html5QrCode.stop().then(() => { scannerRunning = false; document.getElementById('scanToggleBtn').innerText = '📷 Start Camera'; });
    return;
  }
  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 260, height: 100 } },
    (decodedText) => {
      setScannedBarcode(decodedText);
      html5QrCode.stop().then(() => { scannerRunning = false; document.getElementById('scanToggleBtn').innerText = '📷 Start Camera'; });
    },
    () => {}
  ).then(() => {
    scannerRunning = true;
    document.getElementById('scanToggleBtn').innerText = '⏹ Stop Camera';
  }).catch(err => alert('Could not start camera: ' + err));
}

function useManualBarcode() {
  const val = document.getElementById('manualBarcodeInput').value.trim();
  if (!val) return;
  setScannedBarcode(val);
}

function setScannedBarcode(text) {
  scannedBarcode = text.trim().toUpperCase();
  const disp = document.getElementById('barcodeDisplay');
  disp.style.display = 'block';
  disp.innerText = scannedBarcode;
  document.getElementById('step1Summary').innerText = scannedBarcode;
  setStep(2);
}

// ---------- SEARCH ----------
function onSearchInput() {
  const q = document.getElementById('nameSearchInput').value.trim().toLowerCase();
  const resultsBox = document.getElementById('searchResults');
  resultsBox.innerHTML = '';
  if (!q) return;

  const matches = allRows.filter(r =>
    String(r['NAME OF RECEIVER'] || '').toLowerCase().includes(q)
  ).slice(0, 8);

  matches.forEach(r => {
    const done = r['ARTICLE BARCODE'] && String(r['ARTICLE BARCODE']).trim() !== '';
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = '<div class="name">' + r['NAME OF RECEIVER'] +
      (done ? '<span class="badge-done">✓ ' + r['ARTICLE BARCODE'] + '</span>' : '') +
      '</div><div class="meta">Serial #' + r['SERIAL NUMBER'] + ' · PIN ' + r['RECEIVER PINCODE'] +
      ' · ' + String(r['RECEIVER ADDRESS'] || '').slice(0, 36) + '…</div>';
    div.onclick = () => selectCustomer(r);
    resultsBox.appendChild(div);
  });

  if (matches.length === 0) resultsBox.innerHTML = '<div class="log-empty">No match found</div>';
}

function selectCustomer(row) {
  selectedCustomer = row;
  const box = document.getElementById('selectedCustomerBox');
  box.innerHTML = '<div class="result-item selected"><div class="name">' + row['NAME OF RECEIVER'] +
    '</div><div class="meta">Serial #' + row['SERIAL NUMBER'] + ' · PIN ' + row['RECEIVER PINCODE'] + '</div>' +
    '<div class="meta">' + row['RECEIVER ADDRESS'] + '</div></div>';
  document.getElementById('step2Summary').innerText = row['NAME OF RECEIVER'];
  document.getElementById('saveBtn').disabled = false;
  setStep(3);
}

// ---------- SAVE ----------
function saveEntry(force) {
  const statusBox = document.getElementById('statusBox');
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  statusBox.innerHTML = '';

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      serialNumber: selectedCustomer['SERIAL NUMBER'],
      barcode: scannedBarcode,
      force: force
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.status === 'success') {
      showStamp(selectedCustomer['NAME OF RECEIVER']);
      sessionLog.unshift({ name: selectedCustomer['NAME OF RECEIVER'], barcode: scannedBarcode, serial: selectedCustomer['SERIAL NUMBER'] });
      renderLog();
      selectedCustomer['ARTICLE BARCODE'] = scannedBarcode;
      updateProgress();
      setTimeout(resetForNextScan, 900);
    } else if (data.status === 'conflict') {
      saveBtn.disabled = false;
      statusBox.innerHTML = '<div class="status-box status-conflict">This tracking number is already assigned to <b>' +
        data.conflictCustomer + '</b> (Serial #' + data.conflictSerial + ').<br><br>' +
        '<button class="btn-danger" onclick="saveEntry(true)">Save Anyway (Override)</button></div>';
    } else {
      saveBtn.disabled = false;
      statusBox.innerHTML = '<div class="status-box status-error">' + data.message + '</div>';
    }
  })
  .catch(() => {
    saveBtn.disabled = false;
    statusBox.innerHTML = '<div class="status-box status-error">Connection error, please try again</div>';
  });
}

function showStamp(name) {
  document.getElementById('stampName').innerText = name;
  const overlay = document.getElementById('stampOverlay');
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 850);
}

function resetForNextScan() {
  scannedBarcode = '';
  selectedCustomer = null;
  document.getElementById('barcodeDisplay').style.display = 'none';
  document.getElementById('manualBarcodeInput').value = '';
  document.getElementById('nameSearchInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('selectedCustomerBox').innerHTML = '';
  document.getElementById('statusBox').innerHTML = '';
  document.getElementById('step1Summary').innerText = '';
  document.getElementById('step2Summary').innerText = '';
  document.getElementById('saveBtn').disabled = true;
  setStep(1);
}

function renderLog() {
  const q = document.getElementById('logSearchInput').value.trim().toLowerCase();
  document.getElementById('logCount').innerText = sessionLog.length + ' saved';

  const filtered = q ? sessionLog.filter(l =>
    l.name.toLowerCase().includes(q) || l.barcode.toLowerCase().includes(q) || String(l.serial).includes(q)
  ) : sessionLog;

  const box = document.getElementById('logList');
  if (filtered.length === 0) {
    box.innerHTML = '<div class="log-empty">' + (sessionLog.length === 0 ? 'No entries saved yet' : 'No match in session log') + '</div>';
    return;
  }
  box.innerHTML = filtered.map(l =>
    '<div class="log-row"><span>' + l.name + ' <span class="serial">#' + l.serial + '</span></span><span class="barcode">' + l.barcode + '</span></div>'
  ).join('');
}
</script>

</body>
</html>
